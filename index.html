<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📚</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Personal Book Tracker - Track all the books you have read with a modern, responsive application" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Google Fonts: Inter -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Personal Book Tracker | Track Your Reading Journey</title>

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Personal Book Tracker" />
    <meta property="og:description" content="Track all the books you have read with ratings, notes, and search" />
    <meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📚</text></svg>" />

    <style>
      :root {
        --bg-light: #f8faff;
        --bg-dark: #0a0f1e;
        --primary: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
        background-color: var(--bg-light);
      }

      body.dark-mode {
        background-color: var(--bg-dark);
      }

      #root {
        transition: opacity 0.5s ease;
      }

      /* Clean Preloader */
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background-color: inherit;
        transition: opacity 0.4s ease, visibility 0.4s;
      }

      .loader-dots {
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background-color: var(--primary);
        border-radius: 50%;
        opacity: 0.3;
        animation: dotPulse 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes dotPulse {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      .preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <script>
      // Immediate theme check to prevent white flash
      (function() {
        try {
          const darkMode = localStorage.getItem('darkMode');
          if (darkMode === 'true') {
            document.body.classList.add('dark-mode');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="preloader" class="preloader">
      <div class="loader-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    
    <div id="root" style="opacity: 0;"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
